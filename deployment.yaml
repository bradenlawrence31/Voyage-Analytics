apiVersion: apps/v1
kind: Deployment
metadata:
  name: voyage-analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voyage-analytics
  template:
    metadata:
      labels:
        app: voyage-analytics
    spec:
      containers:
      - name: voyage-api
        image: voyage-analytics:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
